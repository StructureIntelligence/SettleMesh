name: content-policy

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  confirmation-language:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep
      - name: Check confirmation language
        run: bash scripts/check-confirmation-language.sh
      - name: Check money settlement truth
        run: bash scripts/check-money-settlement-truth.sh
      - name: Check template JavaScript syntax
        run: |
          node --check templates/ai-saas-paid-api/server.js
          node --check templates/ai-saas-paid-api/public/app.js
          node --check templates/auth-payments-minimal/server.js
          node --check templates/auth-payments-minimal/public/app.js
