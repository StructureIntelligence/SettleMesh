name: content-policy

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  confirmation-language:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep
      - name: Check confirmation language
        run: bash scripts/check-confirmation-language.sh
